sonar.projectKey=ict2216-ssd-quiz-2401499
sonar.projectName=ICT2216 SSD Quiz - 2401499
sonar.sourceEncoding=UTF-8

# Scan all first-party source and configuration, with tests classified separately.
sonar.sources=.
sonar.tests=app/tests
sonar.test.inclusions=app/tests/**
sonar.exclusions=app/tests/**,**/node_modules/**,.git/**,**/reports/**,**/coverage/**,app/reports/ui-failures/**,gitea-data/**,postgres-data/**,sonarqube-data/**,sonar-postgres-data/**,**/.scannerwork/**,**/*.key,**/*.pem,**/*.crt,**/*.log,**/*.tmp,database/100k-most-used-passwords-NCSC.txt
# Community Build has no SQL quality profile; include SQL and documentation in
# the Text/Secrets sensor so these tracked first-party files are still checked.
sonar.text.inclusions=database/**/*.sql,**/*.md,**/*.properties,.gitignore

# The repository is mounted read-only in the scanner container.
sonar.working.directory=/tmp/.scannerwork
