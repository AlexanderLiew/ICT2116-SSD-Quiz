version: "3.8"

services:
  webserver:
    build:
      context: ./webserver
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:8080"
      - "443:8443"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://127.0.0.1:8443/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - ssd-network

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      PORT: "3000"
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: ssd_quiz
      DB_USER: admin
      DB_PASSWORD: 2401499@sit.singaporetech.edu.sg
      PASSWORD_FILE: /app/data/100k-most-used-passwords-NCSC.txt
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ssd-network

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 2401499@sit.singaporetech.edu.sg
      POSTGRES_DB: ssd_quiz
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - ssd-network

  gitserver:
    image: docker.gitea.com/gitea:1.24.7
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__repository__DEFAULT_BRANCH: main
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__DOMAIN: 127.0.0.1
      GITEA__server__ROOT_URL: http://127.0.0.1:3000/
      GITEA__server__SSH_DOMAIN: 127.0.0.1
      GITEA__server__SSH_PORT: "2222"
      GITEA__service__DISABLE_REGISTRATION: "true"
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ssd-network

  sonar-database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar-local-database}
      POSTGRES_DB: ${SONAR_DB_NAME:-sonarqube}
    volumes:
      - sonar-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - ssd-network

  sonarqube:
    image: sonarqube:26.7.0.124771-community
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-database:5432/${SONAR_DB_NAME:-sonarqube}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar-local-database}
    depends_on:
      sonar-database:
        condition: service_healthy
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:9000/api/system/status | grep --quiet '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - ssd-network

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:12.1.0.3233_8.0.1
    profiles:
      - scan
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    depends_on:
      sonarqube:
        condition: service_healthy
    volumes:
      - ./:/usr/src:ro
    working_dir: /usr/src
    networks:
      - ssd-network

networks:
  ssd-network:
    name: ict2216-ssd-network
    driver: bridge

volumes:
  gitea-data:
    name: ict2216-gitea-data
  postgres-data:
    name: ict2216-postgres-data
  sonar-postgres-data:
    name: ict2216-sonar-postgres-data
  sonarqube-data:
    name: ict2216-sonarqube-data
  sonarqube-extensions:
    name: ict2216-sonarqube-extensions
  sonarqube-logs:
    name: ict2216-sonarqube-logs
